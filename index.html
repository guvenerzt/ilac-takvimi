<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gunluk Ilac Takvimi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}
body.tracker-mode{background:#f5f5f0;color:#1a1a1a}
body.dashboard-mode{background:#0a0a10;color:#f0f0f0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-wrap:wrap;gap:8px}
body.tracker-mode .topbar{background:#fff;border-bottom:1px solid #e0e0e0}
body.dashboard-mode .topbar{background:#111118;border-bottom:1px solid #222}
.app-title{font-size:20px;font-weight:700}
body.tracker-mode .app-title{color:#1a1a1a}
body.dashboard-mode .app-title{color:#fff}
.topbar-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;color:#1a1a1a;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:background 0.12s}
.btn:hover{background:#f0f0f0}
.btn-warn{background:#faeeda;color:#854f0b;border-color:#ef9f27}
.btn-info{background:#e6f1fb;color:#185fa5;border-color:#85b7eb}
.btn-success{background:#eaf3de;color:#3b6d11;border-color:#97c459}
.btn-dash{background:#1e1e32;color:#9B8FFF;border:1px solid #3d3080;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-dash:hover{background:#2d2d4a}
.btn-track{background:#e6f1fb;color:#185fa5;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-track:hover{background:#b5d4f4}
body.dashboard-mode .btn{background:#1a1a2e;color:#ccc;border-color:#333}
body.dashboard-mode .btn:hover{background:#2a2a3e}
/* TRACKER */
#tracker-view{display:none;padding:1rem}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.week-lbl{font-size:13px;color:#666;flex:1;text-align:center}
.stat-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 18px;display:inline-flex;align-items:center;gap:10px;margin-bottom:1rem}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-lbl{font-size:13px;color:#666}
.day-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.day-tab{padding:7px 11px;font-size:12px;border:1px solid #ddd;border-radius:8px;cursor:pointer;color:#666;background:#fff;text-align:center;line-height:1.3;transition:all 0.15s}
.day-tab:hover{background:#f0f0f0}
.day-tab.active{background:#e6f1fb;color:#185fa5;border-color:#85b7eb;font-weight:600}
.day-tab.today-tab{border-color:#ef9f27;border-width:2px}
.day-tab .tdate{font-size:10px;display:block;opacity:0.7}
.day-view{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1rem}
.tcol{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:10px 12px}
.tcol-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #eee}
.tc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcol-head .tlabel{font-size:13px;font-weight:600;color:#1a1a1a}
.tcol-head .ttime{font-size:11px;color:#999;margin-left:auto}
.med-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid #f0f0f0}
.med-row:last-child{border-bottom:none}
.chk{width:18px;height:18px;border:1.5px solid #bbb;border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff;transition:all 0.12s}
.chk.on{background:#eaf3de;border-color:#97c459;color:#3b6d11}
.chk.offday{background:#f5f5f5;border-color:#ddd;cursor:default;opacity:0.4}
.mbody{flex:1;min-width:0}
.mname{font-size:13px;font-weight:600;color:#1a1a1a}
.mname.done{text-decoration:line-through;opacity:0.4}
.mdose{font-size:12px;color:#555}
.mnote{font-size:11px;color:#854f0b;font-style:italic;margin-top:1px}
.offbadge{font-size:10px;background:#f5f5f5;color:#999;border-radius:4px;padding:1px 6px;display:inline-block;margin-top:2px}
.tempty{font-size:12px;color:#bbb;text-align:center;padding:10px 0}
.panel{background:#f9f9f5;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.panel h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.panel-hint{font-size:12px;color:#888;margin-bottom:12px}
.mcard{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.mcard-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mcard-name{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;min-width:0}
.fbadge{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:600}
.fdaily{background:#eaf3de;color:#3b6d11}
.falt{background:#faeeda;color:#854f0b}
.fweekly{background:#eeedfe;color:#3c3489}
.dsel{width:100%;font-size:12px;padding:3px 5px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.dsel.hasval{border-color:#85b7eb;background:#e6f1fb}
.dsel:disabled{opacity:0.3;background:#f5f5f5}
.exparea{margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.wtable{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;table-layout:fixed}
.wtable th{font-size:11px;color:#999;font-weight:500;padding:4px 3px;text-align:center;border-bottom:1px solid #eee}
.wtable th.tcol2{color:#185fa5;font-weight:700}
.wtable th.offcol{opacity:0.3}
.wtable td{padding:3px 2px;text-align:center;vertical-align:middle}
.wtable td.offcol{opacity:0.3}
.wtable .tlbl{text-align:left;font-size:11px;font-weight:600;white-space:nowrap;padding-right:8px;width:75px}
.ngrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.ncell label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.ncell input{width:100%;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-family:inherit}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mrow2 label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.mrow2 input{width:100%;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-family:inherit}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:12px;color:#555;font-weight:500;margin-bottom:4px}
.frow select{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;font-family:inherit;background:#fff}
.sopt{padding:10px 12px;border-radius:8px;margin-bottom:10px}
.sopt-alt{background:#faeeda}
.sopt-weekly{background:#eeedfe}
.sopt-lbl{font-size:12px;font-weight:600;display:block;margin-bottom:6px}
.sopt-alt .sopt-lbl{color:#854f0b}
.sopt-weekly .sopt-lbl{color:#3c3489}
.dpicker{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0 8px}
.dpill{padding:4px 10px;border-radius:99px;font-size:12px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666;user-select:none;font-family:inherit;transition:all 0.12s}
.dpill.sel{background:#eeedfe;color:#3c3489;border-color:#afa9ec;font-weight:600}
.ibtn{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px;display:inline-flex;align-items:center;color:#888}
.ibtn:hover{background:#f0f0f0}
.ibtn.del:hover{background:#fcebeb;color:#a32d2d}
.fg label{display:block;font-size:12px;color:#555;margin-bottom:3px;font-weight:500}
.fg input,.fg select{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;font-family:inherit;background:#fff}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.slbl{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
/* DASHBOARD */
#dashboard-view{display:none;padding:1.25rem}
.dh{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:1.5rem;gap:16px}
.dh-title{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.dh-center{display:flex;flex-direction:column;align-items:center;text-align:center;gap:1px}
.dh-day{font-size:38px;font-weight:900;color:#fff;line-height:1}
.dh-num{font-size:52px;font-weight:900;color:#5ddfb5;line-height:1}
.dh-my{font-size:24px;font-weight:700;color:#c8d8f0;line-height:1}
.dh-clock{background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:10px 20px;font-size:20px;font-weight:600;color:#ddd;white-space:nowrap;justify-self:end}
.dsec{margin-bottom:1.75rem}
.dsec-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-radius:14px;margin-bottom:12px;border:1.5px solid transparent}
.dsec-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0}
.dsec-title{font-size:22px;font-weight:800;color:#fff;flex:1}
.dsec-count{font-size:13px;padding:4px 12px;border-radius:99px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.dcard{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform 0.15s}
.dcard:hover{transform:translateY(-2px);border-color:#555}
.dimg-wrap{width:100%;height:130px;background:#111;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dimg{width:100%;height:100%;object-fit:cover;object-position:top left}
.dimg.contain{object-fit:contain;background:#1a0a0a}
.dph{width:60px;height:60px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#aaa}
.dinfo{padding:10px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.dname{font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.ddose{font-size:22px;font-weight:800;color:#5ddfb5;line-height:1.2}
.dnote{font-size:12px;color:#EF9F27;font-style:italic}
/* ALERT */
#alertbox{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;min-width:260px;display:none}
.alertinner{padding:11px 18px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);background:#eaf3de;color:#3b6d11;border:1px solid #97c459}
@media(max-width:700px){
  .dh{grid-template-columns:1fr;gap:8px}
  .dh-day{font-size:26px}
  .dh-num{font-size:36px}
  .dh-my{font-size:18px}
  .dgrid{grid-template-columns:repeat(2,1fr)}
}
@media print{
  .topbar,.week-nav,.day-tabs,.panel,#tracker-view .stat-box{display:none!important}
  body{background:#fff!important;color:#000!important}
  .tcol,.dcard{background:#fff;border:1px solid #ccc}
  .dsec-head{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body class="tracker-mode">
<div id="alertbox"><div class="alertinner" id="alerttxt"></div></div>
<div class="topbar">
  <div class="app-title">💊 Gunluk Ilac Takvimi</div>
  <div id="tbtrack" class="topbar-actions">
    <button class="btn btn-warn" onclick="toggleEdit()">✏️ Ilaclar</button>
    <button class="btn btn-info" onclick="toggleAdd()">+ Ilac Ekle</button>
    <button class="btn" onclick="resetDay()">↺ Sifirla</button>
    <button class="btn" onclick="doBackup()">💾 Yedek</button>
    <button class="btn" onclick="doRestore()">📂 Yukle</button>
    <button class="btn btn-info" onclick="doDownload()">⬇️ HTML</button>
    <button class="btn btn-success" onclick="window.print()">🖨 Yazdir</button>
    <button class="btn-dash" onclick="switchView(0)">📺 Dashboard</button>
  </div>
  <div id="tbdash" class="topbar-actions" style="display:none">
    <button class="btn-track" onclick="switchView(1)">📋 Takvim</button>
  </div>
</div>
<input type="file" id="rfile" accept=".json" style="display:none" onchange="onRestoreFile(this)">
<!-- TRACKER -->
<div id="tracker-view">
  <div class="week-nav">
    <button class="btn" onclick="prevWeek()">← Onceki</button>
    <span class="week-lbl" id="wklbl"></span>
    <button class="btn" onclick="nextWeek()">Sonraki →</button>
  </div>
  <div class="day-tabs" id="daytabs"></div>
  <div class="stat-box"><span class="stat-num" id="stotal">0</span><span class="stat-lbl">Bugun Alinacak</span></div>
  <div id="editwrap" style="display:none"></div>
  <div id="addwrap" style="display:none"></div>
  <div class="day-view" id="dayview"></div>
</div>
<!-- DASHBOARD -->
<div id="dashboard-view">
  <div class="dh">
    <div></div>
    <div class="dh-center">
      <div class="dh-day" id="dhday"></div>
      <div class="dh-num" id="dhnum"></div>
      <div class="dh-my" id="dhmy"></div>
    </div>
    <div class="dh-clock" id="dhclock"></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:1.25rem" id="dashnav">
    <button onclick="dashPrevDay()" style="background:#1a1a2e;border:1px solid #333;color:#ccc;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;font-family:inherit">← Onceki Gun</button>
    <button onclick="dashNextDay()" style="background:#1a1a2e;border:1px solid #333;color:#ccc;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;font-family:inherit">Sonraki Gun →</button>
  </div>
  <div id="dhsections"></div>
</div>

  return diff>=0&&diff%2===0;
}

var TODAY=new Date();TODAY.setHours(0,0,0,0);

var activeDK=todayKey;
// Safety check: if todayKey is not in weekDates, recompute weekDates around todayKey
(function(){
  var keys=weekDates.map(ldk);
  if(keys.indexOf(todayKey)<0){
    // Find the Monday of the week containing todayKey
    var td=gdo(todayKey);
    var dw=td.getDay();
    var diff=dw===0?-6:1-dw;
    var mon=new Date(td.getFullYear(),td.getMonth(),td.getDate()+diff);
    weekDates=Array.from({length:7},function(_,i){return addD(mon,i);});
  }
})();

function clockTick(){

function ckey(dk,mid,tk){return dk+"_"+mid+"_"+tk;}
function isChk(dk,mid,tk){return!!(S.checks[ckey(dk,mid,tk)]);}
function toggleChk(dk,mid,tk){
  var k=ckey(dk,mid,tk);S.checks[k]=!S.checks[k];saveData();
  renderDayView();renderStats();
  var slots=getDaySlots(dk);
  if(slots.length&&slots.every(function(x){return isChk(dk,x.m.id,x.t.key);}))showAlert("Tum ilaclar alindi!");
}
function getDaySlots(dk){
  var dt=gdo(dk),all=[];
  TIMES.forEach(function(t){S.meds.forEach(function(m){if(isActive(m,dk)&&getDose(m,t.key,dt))all.push({m:m,t:t});});});
  return all;
}
function renderTabs(){
  if(!weekDates||weekDates.length===0){

    return "<div class='"+cls+"' data-dk='"+dk+"'>"+DSHORT[i]+"<span class='tdate'>"+d.getDate()+" "+MONTHS[d.getMonth()].slice(0,3)+"</span></div>";

function renderDayView(){
  var dt=gdo(activeDK),dk=activeDK;
  var html=TIMES.map(function(t){
    var rows=S.meds.map(function(m){
      var on=isActive(m,dk),dv=getDose(m,t.key,dt);
      if(!dv)return"";
      var done=isChk(dk,m.id,t.key),note=(m.notes&&m.notes[t.key])||"";
      var row="<div class='med-row' style='"+(on?"":"opacity:0.35")+"'>";

        row+="<div class='chk"+(done?" on":"")+"' data-dk='"+dk+"' data-mid='"+m.id+"' data-tk='"+t.key+"'>"+(done?"&#10003;":"")+"</div>";

      row+="<div class='mbody'><div class='mname"+(done?" done":"")+"'>"+m.name+"</div>";
      row+="<div class='mdose'>"+dlabel(dv)+"</div>";

      if(!on)row+="<div class='offbadge'>Bugun alinmaz</div>";
      row+="</div></div>";

    }).join("");

    if(isExp){
      var adm=m.freq==="weekly"?m.activeDays:null;
      // Name and mg fields
      exp+="<div class='mrow2'>";
      exp+="<div><label>Ad</label><input type='text' class='edfld' data-id='"+m.id+"' data-fld='name' value='"+m.name.replace(/'/g,"&#39;")+"'></div>";
      exp+="<div><label>mg/tablet</label><input type='number' class='edfld' data-id='"+m.id+"' data-fld='mg' min='0' step='any' value='"+(m.mg||"")+"'></div>";
      exp+="</div>";
      // Frequency
      exp+="<div class='frow'><label>Siklik</label><select class='edfld' data-id='"+m.id+"' data-fld='freq'>";
      exp+="<option value='daily'"+(m.freq==="daily"?" selected":"")+">Her gun</option>";
      exp+="<option value='alt'"+(m.freq==="alt"?" selected":"")+">Gun asiri</option>";
      exp+="<option value='weekly'"+(m.freq==="weekly"?" selected":"")+">Belirli gunler</option>";
      exp+="</select></div>";
      // Alt start
      exp+="<div id='ea"+m.id+"' style='display:"+(m.freq==="alt"?"block":"none")+"' class='sopt sopt-alt'>";
      exp+="<span class='sopt-lbl'>Baslangic tarihi</span>";
      exp+="<input type='date' class='edfld' data-id='"+m.id+"' data-fld='altStart' value='"+(m.altStart||todayKey)+"'>";
      exp+="</div>";
      // Weekly picker
      exp+="<div id='ew"+m.id+"' style='display:"+(m.freq==="weekly"?"block":"none")+"' class='sopt sopt-weekly'>";
      exp+="<span class='sopt-lbl'>Alinacak gunler</span>"+dpHtml("ep"+m.id,m.activeDays)+"</div>";
      // Dose table
      exp+=wtHtml("et"+m.id,m.dayDoses,adm);
      // Notes
      exp+="<div class='ngrid'>";
      TIMES.forEach(function(t){
        exp+="<div class='ncell'><label style='color:"+t.color+"'>"+t.label+"</label>";
        exp+="<input type='text' class='notefld' data-id='"+m.id+"' data-tk='"+t.key+"' value='"+((m.notes&&m.notes[t.key])||"").replace(/'/g,"&#39;")+"' placeholder='Not...'></div>";
      });
      exp+="</div>";
      // Save button
      exp+="<div class='fa'><button class='btn btn-success sbtn' data-id='"+m.id+"' id='sbtn"+m.id+"'>Kaydet</button></div>";
      exp="<div class='exparea'>"+exp+"</div>";
    }
    return "<div class='mcard'>"
      +"<div class='mcard-head'><div class='mcard-name'>"+m.name+"</div>"
      +"<span class='fbadge "+fClass(m)+"'>"+fLabel(m)+"</span>"
      +"<button class='ibtn expbtn' data-id='"+m.id+"'>"+(isExp?"&#9650;":"&#9999;")+"</button>"
      +"<button class='ibtn del delbtn' data-id='"+m.id+"'>&#128465;</button></div>"
      +exp+"</div>";
  }).join("");
  wrap.innerHTML="<div class='panel'><h3>Ilaclar</h3><p class='panel-hint'>Kalemi tikla, dozlari sec, Kaydet</p>"+cards+"</div>";

  // Attach events via delegation on wrap
  wrap.onclick=function(e){
    var el;
    // Expand button
    el=e.target.closest(".expbtn");if(el){toggleExp(parseInt(el.getAttribute("data-id")));return;}
    // Delete button
    el=e.target.closest(".delbtn");if(el){delMed(parseInt(el.getAttribute("data-id")));return;}
    // Save button
    el=e.target.closest(".sbtn");if(el){saveDoses(parseInt(el.getAttribute("data-id")));return;}
    // Day pill
    el=e.target.closest(".dpill[data-dk2]");
    if(el){toggleDP(el.getAttribute("data-idp"),el.getAttribute("data-dk2"),el);return;}
  };
  wrap.onchange=function(e){
    var el=e.target;
    // Edit fields
    if(el.classList.contains("edfld")){
      var id=parseInt(el.getAttribute("data-id")),fld=el.getAttribute("data-fld"),v=el.value;
      var m=S.meds.find(function(x){return x.id===id;});
      if(!m)return;
      if(fld==="name"){m.name=v;renderDayView();}
      else if(fld==="mg"){m.mg=v;}
      else if(fld==="freq"){
        m.freq=v;
        document.getElementById("ea"+id).style.display=v==="alt"?"block":"none";
        document.getElementById("ew"+id).style.display=v==="weekly"?"block":"none";
      }
      else if(fld==="altStart"){m.altStart=v;renderDayView();renderStats();}
    }
    // Note fields
    if(el.classList.contains("notefld")){
      var id=parseInt(el.getAttribute("data-id")),tk=el.getAttribute("data-tk"),v=el.value;
      var m=S.meds.find(function(x){return x.id===id;});
      if(m){if(!m.notes)m.notes={};m.notes[tk]=v;renderDayView();}
    }
    // Dose selects - update hasval class
    if(el.classList.contains("dsel")){
      el.className="dsel"+(el.value?" hasval":"");
    }
  };
}

function renderAddForm(){
  var wrap=document.getElementById("addwrap");
  if(!addOpen){wrap.style.display="none";return;}
  wrap.style.display="block";
  var html="<div class='panel'><h3>+ Yeni Ilac</h3>";
  html+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px'>";
  html+="<div class='fg' style='margin:0'><label>Ad *</label><input type='text' id='afname' placeholder='Ilac adi'></div>";
  html+="<div class='fg' style='margin:0'><label>mg/tablet</label><input type='number' id='afmg' min='0' step='any' placeholder='orn. 5'></div></div>";
  html+="<div class='frow'><label>Siklik</label><select id='affreq'>";
  html+="<option value='daily'>Her gun</option><option value='alt'>Gun asiri</option><option value='weekly'>Belirli gunler</option>";
  html+="</select></div>";
  html+="<div id='afaltrow' style='display:none' class='sopt sopt-alt'><span class='sopt-lbl'>Baslangic tarihi</span>";
  html+="<input type='date' id='afalt' value='"+todayKey+"'></div>";
  html+="<div id='afwkrow' style='display:none' class='sopt sopt-weekly'><span class='sopt-lbl'>Alinacak gunler</span>"+dpHtml("afp",emptyAD())+"</div>";
  html+="<div class='slbl' style='margin-top:4px'>Haftalik doz programi</div>"+wtHtml("af",emptyDD(),null);
  html+="<div class='ngrid'>";
  TIMES.forEach(function(t){html+="<div class='ncell'><label style='color:"+t.color+"'>"+t.label+"</label><input type='text' id='afn"+t.key+"' placeholder='Not...'></div>";});
  html+="</div>";
  html+="<div class='fa'><button id='afcancel' class='btn'>Iptal</button><button id='afsubmit' class='btn btn-info'>+ Ekle</button></div>";
  html+="</div>";
  wrap.innerHTML=html;
  document.getElementById("affreq").onchange=function(){
    var v=this.value;
    document.getElementById("afaltrow").style.display=v==="alt"?"block":"none";
    document.getElementById("afwkrow").style.display=v==="weekly"?"block":"none";
  };
  document.getElementById("afcancel").onclick=function(){toggleAdd();};
  document.getElementById("afsubmit").onclick=function(){addMed();};
  // Day pill clicks in add form
  var wkrow=document.getElementById("afwkrow");
  if(wkrow)wkrow.onclick=function(e){
    var el=e.target.closest(".dpill[data-dk2]");
    if(el)toggleDP(el.getAttribute("data-idp"),el.getAttribute("data-dk2"),el);
  };
  wrap.onchange=function(e){
    if(e.target.classList.contains("dsel"))e.target.className="dsel"+(e.target.value?" hasval":"");
  };
}

function dashPrevDay(){dashDate=addD(dashDate,-1);renderDash();}
function dashNextDay(){dashDate=addD(dashDate,1);renderDash();}

function renderDash(){
  clockTick();
  var today=dashDate;
  var dk=ldk(today);
  var secs={};TIMES.forEach(function(t){secs[t.key]=[];});
  S.meds.forEach(function(m){
    if(!isActive(m,dk))return;
    TIMES.forEach(function(t){
      var dv=getDose(m,t.key,today);
      if(!dv)return;
      var note=(m.notes&&m.notes[t.key])||"";
      secs[t.key].push({name:m.name,dose:dlabel(dv),note:note});
    });
  });
  var html="";
  TIMES.forEach(function(t){
    var meds=secs[t.key];if(!meds.length)return;
    html+="<div class='dsec'>"
      +"<div class='dsec-head' style='background:"+t.grad+";border-color:"+t.color+"'>"
      +"<span class='dsec-dot' style='background:"+t.color+";box-shadow:0 0 8px "+t.color+"88'></span>"
      +"<span class='dsec-title'>"+t.label+"</span>"
      +"<span class='dsec-count' style='color:"+t.color+"'>"+meds.length+" ilac</span>"
      +"</div><div class='dgrid'>";
    meds.forEach(function(m){
      var img=IMGS[m.name];
      var itag=img?"<img src='"+img+"' alt='"+m.name+"' class='dimg"+(m.name==="Benipin"?" contain":"")+"'>"
                  :"<div class='dph'>"+m.name[0]+"</div>";
      html+="<div class='dcard' style='border-top:3px solid "+t.color+"'>"
        +"<div class='dimg-wrap'>"+itag+"</div>"
        +"<div class='dinfo'>"
        +"<div class='dname'>"+m.name+"</div>"
        +"<div class='ddose'>💊 "+m.dose+"</div>"
        +(m.note?"<div class='dnote'>ℹ "+m.note+"</div>":"")
        +"</div></div>";
    });
    html+="</div></div>";
  });
  document.getElementById("dhsections").innerHTML=html;
}

function setDay(dk){activeDK=dk;renderTracker();}
function toggleEdit(){editOpen=!editOpen;addOpen=false;renderTracker();}
function toggleAdd(){addOpen=!addOpen;editOpen=false;renderTracker();}
function toggleExp(id){expanded[id]=!expanded[id];renderEditPanel();}
function prevWeek(){weekDates=weekDates.map(function(d){return addD(d,-7);});var nk=weekDates.map(ldk);if(nk.indexOf(activeDK)<0)activeDK=nk[0];renderTracker();}
function nextWeek(){weekDates=weekDates.map(function(d){return addD(d,7);});var nk=weekDates.map(ldk);if(nk.indexOf(activeDK)<0)activeDK=nk[0];renderTracker();}
function afFC(v){document.getElementById("afaltrow").style.display=v==="alt"?"block":"none";document.getElementById("afwkrow").style.display=v==="weekly"?"block":"none";}
function uFreq(id,v){var m=S.meds.find(function(x){return x.id===id;});if(!m)return;m.freq=v;document.getElementById("ea"+id).style.display=v==="alt"?"block":"none";document.getElementById("ew"+id).style.display=v==="weekly"?"block":"none";}
function saveDoses(id){
  var m=S.meds.find(function(x){return x.id===id;});if(!m)return;
  m.dayDoses=readWT("et"+id);
  if(m.freq==="weekly")m.activeDays=getAD("ep"+id);
  if(m.freq==="alt"){var el=document.getElementById("es"+id);if(el)m.altStart=el.value;}
  saveData();renderDayView();renderStats();
  var btn=document.getElementById("sbtn"+id);
  if(btn){btn.textContent="✓ Kaydedildi!";btn.style.background="#eaf3de";btn.style.color="#3b6d11";setTimeout(function(){btn.textContent="✓ Kaydet";btn.style.background="";btn.style.color="";},2000);}
  showAlert(m.name+" kaydedildi");renderEditPanel();
}
function uName(id,v){var m=S.meds.find(function(x){return x.id===id;});if(m){m.name=v;renderDayView();renderEditPanel();}}
function uMg(id,v){var m=S.meds.find(function(x){return x.id===id;});if(m)m.mg=v;}
function uNote(id,tk,v){var m=S.meds.find(function(x){return x.id===id;});if(m){if(!m.notes)m.notes={};m.notes[tk]=v;renderDayView();}}
function uAlt(id,v){var m=S.meds.find(function(x){return x.id===id;});if(m){m.altStart=v;renderDayView();renderStats();}}
function delMed(id){if(!confirm("Silmek istiyor musunuz?"))return;S.meds=S.meds.filter(function(m){return m.id!==id;});delete expanded[id];saveData();renderTracker();showAlert("Silindi.");}
function addMed(){
  var name=document.getElementById("afname").value.trim();if(!name){document.getElementById("afname").focus();return;}
  var freq=document.getElementById("affreq").value;
  var altStart=freq==="alt"?(document.getElementById("afalt").value||todayKey):todayKey;
  var mg=document.getElementById("afmg").value.trim();
  var dd=readWT("af");
  var ad=freq==="weekly"?getAD("afp"):emptyAD();
  var notes={};TIMES.forEach(function(t){var el=document.getElementById("afn"+t.key);notes[t.key]=el?el.value.trim():"";});
  S.meds.push({id:S.nextId++,name:name,mg:mg,freq:freq,altStart:altStart,activeDays:ad,notes:notes,dayDoses:dd});
  addOpen=false;saveData();renderTracker();showAlert(name+" eklendi.");
}
function resetDay(){var p=activeDK+"_";Object.keys(S.checks).forEach(function(k){if(k.indexOf(p)===0)delete S.checks[k];});saveData();renderTracker();showAlert("Sifirlandi.");}
function doBackup(){var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"}));a.download="ilac_yedek_"+ldk(new Date())+".json";a.click();showAlert("Yedek indirildi.");}
function doRestore(){document.getElementById("rfile").value="";document.getElementById("rfile").click();}
function onRestoreFile(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!p||!p.meds)throw"";S=p;saveData();renderTracker();showAlert("Yuklendi: "+S.meds.length+" ilac.");}catch(e){alert("Gecersiz dosya.");}};r.readAsText(f);}
function doDownload(){
  var cur=document.documentElement.outerHTML;
  var data=JSON.stringify(S,null,4);
  var marker="var saved=loadData();";
  var s=cur.indexOf("var DEFAULT_S={"),e=cur.indexOf(marker);
  if(s<0||e<0){showAlert("Hata.");return;}
  var updated=cur.substring(0,s)+"var DEFAULT_S="+data+";\n"+cur.substring(e);
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([updated],{type:"text/html;charset=utf-8"}));
  a.download="gunluk_ilac_takvimi_"+ldk(new Date())+".html";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showAlert("HTML indirildi.");
}
function showAlert(msg){var el=document.getElementById("alertbox"),t=document.getElementById("alerttxt");t.textContent=msg;el.style.display="block";setTimeout(function(){el.style.display="none";},3000);}

switchView(1);

document.addEventListener("click",function(e){
  var pill=e.target.closest(".dpill[data-dk2]");
  if(pill){
    var idP=pill.getAttribute("data-idp"),k=pill.getAttribute("data-dk2");
    toggleDP(idP,k,pill);
  }
});
</script>
